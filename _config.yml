title: artemka fismat`s blog
description: 
author: artemka fismat
email: paa2009kem@yandex.ru
url: "https://artemkaFismat.github.io"
baseurl: ""

# Jekyll settings
markdown: kramdown
highlighter: rouge

# Collections
collections:
  posts:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "Автор"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/ 
